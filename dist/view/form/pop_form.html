<body>
    <style>body,html{background-color:#fff}</style>
    <div style="padding:12px">
        <div class="ez-form ez-form-inline ez-form-full">
            <form action="">
                <div class="ez-form-row">
                    <div class="ez-form-title">类型</div>
                    <div class="ez-form-content">
                        <div class="ez-form-flex">
                            <select name="type" class="ez-form-control">
                                <option value="1">法人啊</option>
                                <option value="2">公司啊</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="ez-form-row">
                    <div class="ez-form-title">电话</div>
                    <div class="ez-form-content">
                        <div class="ez-form-flex">
                            <input type="text" name="number" class="ez-form-control">
                        </div>
                    </div>
                </div>
                <div class="ez-form-row">
                    <div class="ez-form-title">图片</div>
                    <div class="ez-form-content">
                        <div class="ez-form-flex">
                            <span class="ez-form-addon">￥</span>
                            <input type="text" name="picture" class="ez-form-control">
                            <span class="ez-form-addon">.00</span>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script>$(".ez-form-inline-horizontal").find(".ez-form-row-tips").remove()</script>
    <script>var d=new Date;$("body").ez_watermark({watermark:"内部平台, 截屏数据严禁外传",watermark2:"操作人: 张三【"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()+"】"})</script>
