<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="stylesheet" href="/static/fontawesome/5.6.3/css/all.min.css">
    <link rel="stylesheet" href="/static/remixicon/1.3.1/remixicon.css">
    <link rel="stylesheet" href="/static/animate/3.7.2/animate.min.css">
    <link rel="stylesheet" href="/static/nprogress/0.2.0/nprogress.css">
    <link rel="stylesheet" href="/css/ezUI.css">
    <script src="/static/jquery/3.3.1/jquery.min.js"></script>
    <script src="/static/nprogress/0.2.0/nprogress.js"></script>
    <script src="/static/wavesurfer/3.0.0/wavesurfer.min.js"></script>
    <script src="/js/ezUI.js"></script>
    <script src="/js/ezAdmin.js"></script>
</head>

<body>
    <style>h3,p{text-align:center}</style>
    <h3>button 、a</h3>
    <p>
        <button class="ez btn">默认 .btn</button>
        <a class="ez btn btn-primary">主要 .btn-primary</a>
        <button class="ez btn btn-secondary">次要 .btn-secondary</button>
        <a class="ez btn btn-success">成功 .btn-success</a>
        <button class="ez btn btn-warning">警告 .btn-warning</button>
        <a class="ez btn btn-danger">危险 .btn-danger</a>
        <button class="ez btn btn-link">链接 .btn-link</button>
        <a class="ez btn btn-disabled">禁用 .btn-disabled</a>
    </p>
    <h3>带边框</h3>
    <p>
        <button class="ez btn btn-border">.btn-border</button>
        <button class="ez btn btn-border btn-primary">.btn-border</button>
        <button class="ez btn btn-border btn-secondary">.btn-border</button>
        <button class="ez btn btn-border btn-success">.btn-border</button>
        <button class="ez btn btn-border btn-warning">.btn-border</button>
        <button class="ez btn btn-border btn-danger">.btn-border</button>
        <button class="ez btn btn-border btn-link">.btn-border</button>
        <button class="ez btn btn-border btn-disabled">.btn-border</button>
    </p>
    <h3>圆角</h3>
    <p>
        <button class="ez btn btn-radius">.btn-radius</button>
        <button class="ez btn btn-radius btn-primary">.btn-radius</button>
        <button class="ez btn btn-radius btn-secondary">.btn-radius</button>
        <button class="ez btn btn-radius btn-success">.btn-radius</button>
        <button class="ez btn btn-radius btn-warning">.btn-radius</button>
        <button class="ez btn btn-radius btn-danger">.btn-radius</button>
        <button class="ez btn btn-radius btn-link">.btn-radius</button>
        <button class="ez btn btn-radius btn-disabled">.btn-radius</button>
    </p>
    <h3>椭圆</h3>
    <p>
        <button class="ez btn btn-round">.btn-round</button>
        <button class="ez btn btn-round btn-primary">.btn-round</button>
        <button class="ez btn btn-round btn-secondary">.btn-round</button>
        <button class="ez btn btn-round btn-success">.btn-round</button>
        <button class="ez btn btn-round btn-warning">.btn-round</button>
        <button class="ez btn btn-round btn-danger">.btn-round</button>
        <button class="ez btn btn-round btn-link">.btn-round</button>
        <button class="ez btn btn-round btn-disabled">.btn-round</button>
    </p>
    <h3>sm按钮</h3>
    <p>
        <button class="ez btn btn-sm btn-primary">.btn-sm</button>
        <button class="ez btn btn-sm btn-radius btn-primary">.btn-sm</button>
        <button class="ez btn btn-sm btn-round btn-primary">.btn-sm</button>
    </p>
    <p></p>
    <h3>xs按钮</h3>
    <p>
        <button class="ez btn btn-xs btn-primary">.btn-xs</button>
        <button class="ez btn btn-xs btn-radius btn-primary">.btn-xs</button>
        <button class="ez btn btn-xs btn-round btn-primary">.btn-xs</button>
    </p>
    <p></p>
    <h3>lg按钮</h3>
    <p>
        <button class="ez btn btn-lg btn-primary">.btn-lg</button>
        <button class="ez btn btn-lg btn-radius btn-primary">.btn-lg</button>
        <button class="ez btn btn-lg btn-round btn-primary">.btn-lg</button>
    </p>
    <h3>块</h3>
    <p>
        <button class="ez btn btn-xs btn-block btn-primary">.btn-block</button>
        <button class="ez btn btn-sm btn-block btn-radius btn-success">.btn-block</button>
        <button class="ez btn btn-block btn-round btn-disabled">.btn-block</button>
        <button class="ez btn btn-lg btn-block btn-round btn-border btn-warning">.btn-block</button>
    </p>
    <h3>图标</h3>
    <h3>组</h3>
</body>

</html>
